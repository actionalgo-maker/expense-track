name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        working-directory: ExpenseTrackerApp
        run: |
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.4; fi
          chmod +x gradlew

      - name: Build debug APK
        working-directory: ExpenseTrackerApp
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ExpenseTrackerApp/app/build/outputs/apk/debug/app-debug.apk
